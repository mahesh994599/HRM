{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="icon" type="image/png" sizes="32x32" href="{% if white_label_company.icon %}{{white_label_company.icon.url}}{% else %}{% static 'favicons/favicon-32x32.png' %}{% endif %}">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #0F0E2B 0%, #1E1B4B 40%, #312E81 70%, #4338CA 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }
        .blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; opacity: 0.4; }
        .blob-1 { width: 500px; height: 500px; background: rgba(99,102,241,0.3); top: -150px; right: -100px; }
        .blob-2 { width: 400px; height: 400px; background: rgba(6,182,212,0.15); bottom: -120px; left: -80px; }

        .error-container {
            text-align: center;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        .error-icon {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.08);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            backdrop-filter: blur(10px);
        }
        .error-icon svg { width: 36px; height: 36px; stroke: #A5B4FC; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
        .error-code {
            font-size: 7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #E0E7FF, #A5B4FC, #818CF8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
        }
        .error-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #FFFFFF;
            margin-bottom: 0.75rem;
            letter-spacing: -0.02em;
        }
        .error-desc {
            font-size: 1rem;
            color: #C7D2FE;
            line-height: 1.7;
            max-width: 420px;
            margin: 0 auto 2.5rem;
        }
        .error-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #4F46E5;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            padding: 12px 28px;
            font-size: 0.92rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(79,70,229,0.4);
        }
        .error-btn:hover {
            background: #3730A3;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(79,70,229,0.5);
            color: #FFFFFF;
        }
        .error-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.35rem; }
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="error-container">
        <div class="error-icon">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </div>
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="error-btn">
            <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Return Home
        </a>
    </div>
</body>
</html>
