{% load i18n %}
<div class="oh-modal__dialog-header pb-0">
  <span class="oh-modal__dialog-title" id="createModalLabel">
    {% if form.instance.id %}
      {% trans "Update Disbursement Bank Account" %}
    {% else %}
      {% trans "Add Disbursement Bank Account" %}
    {% endif %}
  </span>
  <button class="oh-modal__close" aria-label="Close">
    <ion-icon name="close-outline"></ion-icon>
  </button>
</div>
<div class="oh-modal__dialog-body">
    <form
        {% if form.instance.id %}
            hx-post="{% url 'update-disbursement-account' form.instance.id %}"
        {% else %}
            hx-post="{% url 'create-disbursement-account' %}"
        {% endif %}
        method="post"
        hx-target="#objectCreateModalTarget"
    >
    {% csrf_token %} {{ form.non_field_errors }}
    {{ form.as_p }}
    </form>
</div>
